<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
    <title>Janji Suci - Undangan Pernikahan Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      html, body { overflow-x: hidden; }

      img {
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        pointer-events: none;
      }

      .g-cell { pointer-events: auto; }
      .g-cell img { pointer-events: none; }

      input, select, textarea { font-size: 16px !important; }

      * {
        -webkit-user-select: none;
        user-select: none;
      }
      input, textarea, [contenteditable] {
        -webkit-user-select: text;
        user-select: text;
      }
    </style>
    <script>
      let lastTap = 0
      document.addEventListener('touchend', function(e) {
        const now = Date.now()
        if (now - lastTap < 300) e.preventDefault()
        lastTap = now
      }, { passive: false })

      document.addEventListener('touchmove', function(e) {
        if (e.touches.length > 1) e.preventDefault()
      }, { passive: false })

      document.addEventListener('contextmenu', function(e) {
        if (e.target.tagName === 'IMG') e.preventDefault()
      })
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
